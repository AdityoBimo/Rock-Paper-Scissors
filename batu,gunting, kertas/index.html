<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play rock, paper, scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="container">
        <div class="result_field">

            <div class="result_image ">
                <span class="user_result">
                    <img src="batu.png" alt="user">
                </span>
                <span class="computer_result">
                    <img src="batu.png" alt="computer">
                </span>
            </div>
            <div class="result">Lets Play!!</div>   
        </div>

        <div class="option">
            <span class="option_image">
                <img src="batu.png" alt="Batu">
                <p>Batu</p>
            </span>
            <span class="option_image">
                <img src="gunting.png" alt="Batu">
                <p>Gunting</p>
            </span>
            <span class="option_image">
                <img src="kertas.png" alt="Batu">
                <p>Kertas</p>
            </span>
        </div>

    </section>

    <script src="script.js" defer></script>
</body>
</html>
